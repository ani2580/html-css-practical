<!DOCTYPE html><!--index.htmlが「HTMLを記述されている」ことをプラウザに認識させるもの-->
<html>
  <head>
    <meta charset="UTF-8"><!--Webページやファイルを世界中のあらゆる文字で正しく表示するための文字コード-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--Webサイトをモバイル端末で正しく表示する為のviewport（ビューポート）-->
    <meta name="description" content="Kazuki Asahinaの自己紹介と趣味のカメラで撮影した写真を掲載しているサイトです。"><!--検索した際にWebの概要にでる文章-->
    <title>MyProfile</title><!--検索時にでるタイトル-->
    <link rel="stylesheet" href="css/style.css"><!--外部のCSSファイルをHTMLに読み込むためにHTMLタグ-->
    <link rel="preconnect" href="https://fonts.googleapis.com"> <!-- 1. Google APIサーバーへの事前接続 -->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><!-- 2. フォントデータが置かれているサーバーへの事前接続（crossoriginが必要） -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet"><!-- 3. 実際のフォントCSSの読み込み-->
    </head>

    <body>
      <!--ここからヘッダー-->
      <header>
        <div class="header-inner"><!--コンテンツの表示幅を制限して中央に寄せる-->
          <h1>
            <a href="index.html" class="home">My Profile</a><!--ホームページへのリンクを設定するコード-->
          </h1>
              <!--ここからナビゲーション-->
          <nav>
            <ul class="menu"><!--ul=Unordered List(順序のないリスト)cssを装飾するためのクラス名としてclass="menu"を付与-->
              <li><a href="about">About</a></li><!--li(List Item)箇条書きの項目を作成するためのタグ-->
              <li><a href="works">Works</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main>
        <article>
          <!--ここからメイン画像-->
           <div>
            <img src="images/main.png" art="CanonのCamera" class="mainpic">
           </div>
          <!--ここからAbout-->
          <section class="about">
            <h2 id="about">About</h2>
              <div class="about-inner">
                <img src="images/about.png" alt="Kazuki Asahina" class="circle">
              <div class="content">
                <p class="name">Kazuki Asahina</p>
                <ul>
                  <li>25歳 長野県佐久市出身</li>
                  <li>ソフトウェア業界でマーケティングに従事</li>
                  <li>趣味はカメラ、愛機はCanon</li>
                  <li>自然を撮影するのが好きで、海や山によく行く</li>
                </ul>
              </div>
            </div>
          </section>

          <!-- ここからWorks -->
         <section class="works">
          <h2 id="works">Works</h2>
          <div class="works-inner">
            <div class="item">
              <img src="images/works1.png" alt="日本海">
              <p>新潟に訪れた際に、日本海の雄大さを魅了されて撮影した1枚</p>
            </div>
            <div class="item">
              <img src="images/works2.png" alt="冠雪した御嶽山">
              <p>地元長野の木曽町から撮影した、冠雪した御嶽山</p>
            </div>
            <div class="item">
              <img src="images/works3.png" alt="京都の街並み">
              <p>京都で撮影した、明け方の古き良き日本の町並み</p>
            </div>
          </div>
         </section>
        </article>
      </main>

      <!--ここからフッター-->
      <footer>
      <p>&copy; MyProfile. All rights reserved.</p>
     </footer>
    </body>
</html>
